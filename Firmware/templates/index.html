<!DOCTYPE html>
<html>
<head>
    <title>A.U.R.O.R.A. Control</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; }
        .nav-menu { background: #333; padding: 10px; margin-bottom: 20px; }
        .nav-menu a { color: #00ffcc; text-decoration: none; margin: 0 15px; font-weight: bold; }
        .btn { padding: 20px; width: 100px; margin: 5px; font-size: 18px; border-radius: 10px; border: none; cursor: pointer; }
        .btn-dir { background: #444; color: white; }
        .btn-ai { background: #007bff; color: white; width: 150px; }
        .btn-stop { background: #dc3545; color: white; }
    </style>
</head>
<body>
    <div class="nav-menu">
        <a href="">SYSTEM INSTRUCTIONS</a>
    </div>

    <h1>A.U.R.O.R.A. Command</h1>
    
    <div>
        <button class="btn btn-dir" onclick="sendCmd('forward')">↑</button><br>
        <button class="btn btn-dir" onclick="sendCmd('left')">←</button>
        <button class="btn btn-stop" onclick="sendCmd('stop')">STOP</button>
        <button class="btn btn-dir" onclick="sendCmd('right')">→</button><br>
        <button class="btn btn-dir" onclick="sendCmd('backward')">↓</button>
    </div>

    <hr style="margin: 30px;">

    <div>
        <button class="btn btn-ai" onclick="sendCmd('ai_on')">AI NAV ON</button>
        <button class="btn btn-ai" onclick="sendCmd('ai_off')">AI NAV OFF</button>
    </div>

    <script>
        function sendCmd(command) {
            fetch('/control', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({command: command})
            });
        }
    </script>
</body>
</html>
